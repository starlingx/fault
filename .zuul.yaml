---

- project:
    templates:
      - publish-stx-docs
      - stx-api-ref-jobs
      - stx-release-notes-jobs
      - stx-bandit-jobs
    check:
      jobs:
        - fault-tox-linters
        - fault-tox-pep8
        - fault-tox-pylint
        - fault-rest-api-py39
    gate:
      jobs:
        - fault-tox-linters
        - fault-tox-pep8
        - fault-tox-pylint
        - fault-rest-api-py39
    post:
      jobs:
        - stx-fault-upload-git-mirror

- job:
    name: fault-tox-linters
    parent: openstack-tox-linters
    description: |
      Run tox linters on specific nodeset
    nodeset: debian-bullseye

- job:
    name: fault-tox-pep8
    parent: openstack-tox-pep8
    description: |
      Run pep8 tests (flake8) on specific nodeset
    nodeset: debian-bullseye

- job:
    name: fault-rest-api-py39
    parent: tox-py39
    description: |
      Run py39 test for fm-rest-api
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/utilities
    vars:
      bindep_profile: test py39
      python_version: 3.9
      tox_envlist: py39
      tox_extra_args: -c fm-rest-api/fm/tox.ini

- job:
    name: fault-tox-pylint
    parent: tox
    description: |
      Run pylint for python files in fault
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
    vars:
      tox_envlist: pylint

- job:
    name: stx-fault-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/fault to
      github.com/starlingx/fault
    vars:
      git_mirror_repository: starlingx/fault
    secrets:
      - name: git_mirror_credentials
        secret: stx-fault-github-secret3
        pass-to-parent: true

